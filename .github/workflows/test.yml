name: Check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      # Stylelint canon gate. Invoked directly (not via npm script) because
      # package.json is not editable in this environment; when a lint:css
      # script is added, swap to `bun run lint:css`.
      - run: bunx stylelint "src/**/*.css"
      - run: bun run test

name: Check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      # Unified gate: Stylelint canon → ESLint → Vitest, fail-fast.
      # Mirrors the local `npm run check` script so contributors hit the
      # same wall locally that CI hits in PR review.
      - run: bunx stylelint "src/**/*.css"
      - run: bun run lint
      - run: bun run test
